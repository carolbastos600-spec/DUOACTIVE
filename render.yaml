services:
  - type: web
    name: duo-active-site
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    disk:
      name: duo-active-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: HOST
        value: 0.0.0.0
      - key: PUBLIC_BASE_URL
        value: https://www.duoactive.com.br
      - key: CHECKOUT_SUCCESS_URL
        value: https://www.duoactive.com.br/#checkout
      - key: CHECKOUT_PENDING_URL
        value: https://www.duoactive.com.br/#checkout
      - key: CHECKOUT_FAILURE_URL
        value: https://www.duoactive.com.br/#checkout
      - key: MERCADO_PAGO_ACCESS_TOKEN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: Duo Active <pedidos@duoactive.com.br>
      - key: MERCADO_PAGO_WEBHOOK_SECRET
        sync: false
      - key: MELHOR_ENVIO_CLIENT_ID
        sync: false
      - key: MELHOR_ENVIO_CLIENT_SECRET
        sync: false
      - key: MELHOR_ENVIO_REDIRECT_URI
        value: https://duoactive.com.br/api/melhor-envio/callback
      - key: MELHOR_ENVIO_FROM_POSTAL_CODE
        sync: false
      - key: MELHOR_ENVIO_TOKEN_FILE
        value: /var/data/melhor-envio-tokens.json
      - key: MELHOR_ENVIO_TECHNICAL_EMAIL
        value: pedidos@duoactive.com.br
